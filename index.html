<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IBS 1 Resilience Stress Test · Cranfield School of Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f6fb; font-family: 'Nunito Sans', sans-serif; color: #4a5568; min-height: 100vh; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; cursor: pointer; height: 20px; }
    input[type=range]::-webkit-slider-runnable-track { height: 5px; border-radius: 3px; background: #e2e8f0; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #1B3A6B; margin-top: -5.5px; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    input[type=range]::-moz-range-track { height: 5px; border-radius: 3px; background: #e2e8f0; }
    input[type=range]::-moz-range-thumb { height: 16px; width: 16px; border-radius: 50%; background: #1B3A6B; border: none; }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 3px rgba(229,57,53,0.25);}50%{box-shadow:0 0 0 8px rgba(229,57,53,0.07);} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
    @keyframes spin { to{transform:rotate(360deg);} }
    @keyframes calcPulse { 0%,100%{opacity:0.5;}50%{opacity:1;} }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
    .primary-btn { background:#1B3A6B;color:#fff;border:none;border-radius:8px;padding:13px 28px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:background 0.2s;letter-spacing:0.3px; }
    .primary-btn:hover{background:#122848;}
    .primary-btn:disabled{background:#94a3b8;cursor:not-allowed;}
    .ghost-btn{background:transparent;color:#1B3A6B;border:2px solid #e8edf5;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all 0.2s;}
    .ghost-btn:hover{border-color:#1B3A6B;}
    .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;box-shadow:0 1px 4px rgba(27,58,107,0.06);}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:#f4f6fb;}
    ::-webkit-scrollbar-thumb{background:#e8edf5;border-radius:3px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const NAVY='#1B3A6B',NAVY_DARK='#122848',NAVY_MID='#2a5298',NAVY_LIGHT='#e8edf5',NAVY_PALE='#f4f6fb';
const WHITE='#ffffff',GREY='#4a5568',GREY_L='#e2e8f0',GREY_M='#94a3b8';
const GREEN='#2e7d32',GREEN_BG='#e8f5e9',GREEN_B='#4caf50';
const AMBER='#e65100',AMBER_BG='#fff8e1',AMBER_B='#ffb300';
const RED='#b71c1c',RED_BG='#ffebee',RED_B='#e53935';
const DIM={workforce:'#2a5298',infrastructure:'#1B6B5A',social:'#7C4A00',environment:'#2E6B1B',finance:'#6B1B4A'};

const DIMENSIONS=[
  {id:'workforce',label:'Workforce',color:DIM.workforce,desc:'People and expertise dedicated to programme delivery',
   resources:[
    {id:'perm_faculty',label:'Permanent Faculty',desc:'Core academic staff delivering taught sessions',default:100,amberAt:80,redAt:65,dependents:['visiting_practitioners','supervision'],depNote:'Below 80%, pressure shifts onto visiting practitioners to cover taught sessions.',financeLink:'prog_budget'},
    {id:'visiting_practitioners',label:'Visiting Practitioners',desc:'Industry experts delivering applied content',default:100,amberAt:75,redAt:55,dependents:['contact_hours'],depNote:'Below 75%, applied sessions cannot be covered by permanent faculty alone.',financeLink:'prog_budget'},
    {id:'supervision',label:'Supervision Allocation',desc:'Individual supervisor time per student',default:100,amberAt:80,redAt:60,dependents:['feedback_cycle'],depNote:'Below 80%, feedback turnaround begins to exceed the 10-day threshold.',financeLink:null},
    {id:'faculty_dev',label:'Faculty Development Time',desc:'Time for curriculum refresh and preparation',default:100,amberAt:70,redAt:50,dependents:['curriculum_currency'],depNote:'Below 70%, curriculum currency degrades — content lags industry practice.',financeLink:null},
  ]},
  {id:'infrastructure',label:'Infrastructure',color:DIM.infrastructure,desc:'Physical and digital assets required for delivery',
   resources:[
    {id:'teaching_spaces',label:'Teaching Spaces',desc:'Classrooms, seminar rooms, breakout spaces',default:100,amberAt:80,redAt:65,dependents:['cohort_participation'],depNote:'Below 80%, cohort must be split — peer learning integrity is reduced.',financeLink:'facilities_spend'},
    {id:'hybrid_tech',label:'Hybrid Delivery Technology',desc:'AV, streaming and collaboration platforms',default:100,amberAt:85,redAt:70,dependents:['cohort_participation','feedback_cycle'],depNote:'Below 85%, remote access degrades — effective cohort size falls.',financeLink:'tech_spend'},
    {id:'vle',label:'Virtual Learning Environment',desc:'Learning platform, materials access, submission portal',default:100,amberAt:90,redAt:80,dependents:['feedback_cycle','curriculum_currency'],depNote:'Below 90%, submission and feedback delivery are disrupted.',financeLink:'tech_spend'},
  ]},
  {id:'social',label:'Social',color:DIM.social,desc:'Human relationships and cohort dynamics that enable learning',
   resources:[
    {id:'cohort_size',label:'Cohort Size',desc:'Students actively enrolled and participating',default:100,amberAt:75,redAt:60,dependents:['cohort_participation'],depNote:'Below 75%, the peer dynamic underpinning cohort-based learning begins to break down.',financeLink:'student_continuity'},
    {id:'cohort_participation',label:'Active Session Participation',desc:'Students attending and engaging in sessions',default:100,amberAt:70,redAt:55,dependents:[],depNote:'Below 70%, group work quality and peer challenge — core to the Cranfield method — is compromised.',financeLink:null},
    {id:'curriculum_currency',label:'Curriculum Currency',desc:'Relevance of content to current industry practice',default:100,amberAt:80,redAt:65,dependents:[],depNote:'Below 65%, students cannot develop capabilities that reflect current leadership practice.',financeLink:null},
    {id:'feedback_cycle',label:'Assessment Feedback Cycle',desc:'Feedback returned within 10 working days',default:100,amberAt:85,redAt:70,dependents:[],depNote:'Below 70%, students cannot act on feedback within the programme cycle.',financeLink:null},
  ]},
  {id:'environment',label:'Environment',color:DIM.environment,desc:'Natural capital and physical campus conditions',isNatural:true,
   resources:[
    {id:'campus_env',label:'Campus Environment Quality',desc:'Green space, air quality and wellbeing conditions',default:100,amberAt:75,redAt:55,dependents:['cohort_participation'],depNote:'Below 75%, conditions supporting cognitive performance and student wellbeing are compromised.',financeLink:null},
    {id:'env_stability',label:'Environmental Stability',desc:'Absence of disruption from extreme weather or hazards',default:100,amberAt:70,redAt:50,dependents:['teaching_spaces','cohort_participation'],depNote:'Below 70%, physical disruption begins to affect access to teaching spaces.',financeLink:null},
    {id:'estate_sustainability',label:'Estate Sustainability',desc:'Long-term stewardship of the physical environment',default:100,amberAt:80,redAt:65,dependents:['teaching_spaces'],depNote:'Below 80%, deferred maintenance begins to reduce usable teaching space.',financeLink:'facilities_spend'},
  ]},
];

const FINANCE=[
  {id:'prog_budget',label:'Programme Budget Availability',desc:'Funding allocated to deliver this cohort',feeds:['perm_faculty','visiting_practitioners']},
  {id:'tech_spend',label:'Technology & Platform Spend',desc:'Budget sustaining digital infrastructure',feeds:['hybrid_tech','vle']},
  {id:'facilities_spend',label:'Facilities & Estate Spend',desc:'Budget for physical spaces and maintenance',feeds:['teaching_spaces','estate_sustainability']},
  {id:'student_continuity',label:'Student Financial Continuity',desc:'Students remaining funded and enrolled throughout',feeds:['cohort_size']},
];

const ALL_RES=DIMENSIONS.flatMap(d=>d.resources);

const MECHS={
  redundancy:{label:'Redundancy',icon:'⊕',color:DIM.workforce,desc:'Build backup capacity so when a resource fails, an equivalent replaces it without degrading the service.'},
  flexibility:{label:'Flexibility',icon:'⟳',color:DIM.infrastructure,desc:'Design resources and processes to reconfigure quickly in response to changing conditions.'},
  diversity:{label:'Diversity',icon:'◈',color:DIM.social,desc:'Use a variety of resource types so no single failure point can take down the whole system.'},
  modularity:{label:'Modularity',icon:'⧉',color:DIM.finance,desc:'Structure delivery so components can be isolated or rescheduled without cascading failure.'},
};

const RECS={
  perm_faculty:{m:'redundancy',why:'Permanent faculty is a single-point resource with no natural substitute. An expanded practitioner pool authorised to deliver core sessions is the primary protection.',action:'Maintain a standing pool of at least 3 qualified practitioners per module who can step in at short notice.'},
  visiting_practitioners:{m:'diversity',why:'Visiting practitioners are inherently variable. Diversity across sectors and formats ensures no single cancellation depletes the applied learning offer.',action:'Source practitioners across at least three industries and two seniority levels per cohort.'},
  supervision:{m:'modularity',why:'Supervision cascades into feedback timing. Modular design with handover protocols ensures continuity when individual supervisors are unavailable.',action:'Assign each student a primary and secondary supervisor with shared progress records.'},
  faculty_dev:{m:'flexibility',why:'Curriculum currency depends on development time that is protected but portable.',action:'Protect development time as a standing calendar commitment — moveable within term, never cancelled.'},
  teaching_spaces:{m:'flexibility',why:'Space constraints are resolved through flexible delivery design — sessions that work in-person, split-cohort, or hybrid without redesign.',action:'Certify all taught sessions for hybrid delivery so any space reduction triggers a pre-tested fallback.'},
  hybrid_tech:{m:'redundancy',why:'Technology failure is binary and fast-cascading. Redundant platforms with tested fallback protocols are the most reliable protection.',action:'Maintain a secondary streaming platform with a documented switch-over protocol tested each term.'},
  vle:{m:'redundancy',why:'VLE outage disrupts submission and feedback simultaneously. A redundant content channel preserves continuity.',action:'Mirror all active module materials to a secondary shared drive accessible without VLE login.'},
  cohort_size:{m:'modularity',why:'Cohort integrity is protected by modular design ensuring peer learning functions with smaller sub-groups.',action:'Design all group activities to function with sub-groups of 4–6, not dependent on full cohort presence.'},
  cohort_participation:{m:'flexibility',why:'Participation variability is best absorbed through flexible session design — asynchronous options that maintain continuity.',action:'Record all core taught sessions with structured reflection prompts for asynchronous engagement.'},
  curriculum_currency:{m:'diversity',why:'Curriculum currency is best maintained through diverse review inputs — not relying solely on faculty development time.',action:'Convene a practitioner advisory panel each term to review applied content relevance.'},
  feedback_cycle:{m:'flexibility',why:'Feedback cycles depend on multiple resources. Staged feedback points distribute load and prevent cascade from supervision pressure.',action:'Replace single-point submissions with staged checkpoints, each with a defined 5-day feedback window.'},
  campus_env:{m:'modularity',why:'Campus environment degradation affects wellbeing and cognitive performance. Modular design allows delivery to flex across alternative campus locations.',action:'Map and certify alternative delivery locations across the campus estate.'},
  env_stability:{m:'redundancy',why:'Environmental disruption is unpredictable and rapid. Redundant delivery capability — pre-certified hybrid and off-campus options — is the most reliable protection.',action:'Maintain pre-approved off-campus and fully remote delivery protocols tested annually.'},
  estate_sustainability:{m:'modularity',why:'Estate degradation reduces usable space progressively. Modular timetabling allows rapid reallocation as spaces become unavailable.',action:'Maintain a live register of teaching space capacity with pre-assigned reallocation protocols.'},
};

const SCENARIOS=[
  {id:'baseline',name:'Steady State',subtitle:'All dimensions fully operational',tag:'GREEN',tagColor:GREEN_B,
   desc:'A programme running at full capacity across all dimensions. Used to establish what a resilient baseline looks like and confirm tolerances are comfortably met.',
   values:Object.fromEntries(ALL_RES.map(r=>[r.id,100])),
   finance:Object.fromEntries(FINANCE.map(f=>[f.id,'healthy']))},
  {id:'workforce_shock',name:'Workforce Under Pressure',subtitle:'Single dimension stress propagating outward',tag:'AMBER',tagColor:AMBER_B,
   desc:'Workforce resources are significantly degraded, triggering cascades into contact hours and feedback cycles. Other dimensions remain stable. Demonstrates how pressure in one area propagates through dependencies.',
   values:{perm_faculty:62,visiting_practitioners:58,supervision:65,faculty_dev:55,teaching_spaces:100,hybrid_tech:100,vle:100,cohort_size:90,cohort_participation:82,curriculum_currency:85,feedback_cycle:88,campus_env:100,env_stability:100,estate_sustainability:100},
   finance:{prog_budget:'pressured',tech_spend:'healthy',facilities_spend:'healthy',student_continuity:'healthy'}},
  {id:'slow_erosion',name:'Slow Erosion',subtitle:'Moderate degradation across multiple dimensions',tag:'RED',tagColor:RED_B,
   desc:'No single catastrophic failure — instead a pattern of gradual decline across workforce, infrastructure and social dimensions. Demonstrates how cumulative drift can breach tolerance without any obvious trigger.',
   values:{perm_faculty:72,visiting_practitioners:68,supervision:72,faculty_dev:62,teaching_spaces:74,hybrid_tech:76,vle:82,cohort_size:68,cohort_participation:61,curriculum_currency:70,feedback_cycle:73,campus_env:78,env_stability:85,estate_sustainability:76},
   finance:{prog_budget:'pressured',tech_spend:'pressured',facilities_spend:'pressured',student_continuity:'pressured'}},
  {id:'cliff_edge',name:'Sudden Infrastructure Collapse',subtitle:'Single catastrophic failure hitting tolerance immediately',tag:'RED',tagColor:RED_B,
   desc:'A single infrastructure resource collapses completely, triggering immediate cascade failure across cohort participation, feedback delivery and curriculum access. Demonstrates cliff-edge threshold behaviour.',
   values:{perm_faculty:95,visiting_practitioners:90,supervision:88,faculty_dev:85,teaching_spaces:90,hybrid_tech:20,vle:15,cohort_size:88,cohort_participation:38,curriculum_currency:72,feedback_cycle:30,campus_env:95,env_stability:92,estate_sustainability:90},
   finance:{prog_budget:'healthy',tech_spend:'critical',facilities_spend:'healthy',student_continuity:'healthy'}},
];

function computeState(values){
  const rs={};const cascades=[];const breaches=[];const warnings=[];
  ALL_RES.forEach(r=>{
    const v=values[r.id]??100;
    let state='green';
    if(v<=r.redAt)state='red';
    else if(v<=r.amberAt)state='amber';
    rs[r.id]={value:v,state};
    if(state==='red')breaches.push(r);
    else if(state==='amber')warnings.push(r);
    if(state!=='green')r.dependents.forEach(dep=>cascades.push({from:r.id,to:dep,severity:state}));
  });
  let sys='green';
  if(breaches.length>0)sys='red';
  else if(warnings.length>0||cascades.length>0)sys='amber';
  const vulns=[...new Map([...breaches,...warnings.filter(r=>cascades.some(c=>c.from===r.id))].map(r=>[r.id,r])).values()];
  return{rs,sys,breaches,warnings,cascades,vulns};
}

const SC={
  green:{bg:GREEN_BG,border:GREEN_B,text:GREEN,dot:GREEN_B},
  amber:{bg:AMBER_BG,border:AMBER_B,text:AMBER,dot:AMBER_B},
  red:{bg:RED_BG,border:RED_B,text:RED,dot:RED_B},
};

function CompactSlider({resource,value,onChange,state,dimColor}){
  const s=SC[state];
  return(
    <div style={{marginBottom:7,padding:'8px 10px',background:state==='green'?'#fafbfd':s.bg,border:`1px solid ${state==='green'?GREY_L:s.border}`,borderRadius:8,transition:'all 0.3s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <div style={{fontSize:11,fontWeight:800,color:NAVY,flex:1,paddingRight:8,lineHeight:1.3}}>{resource.label}</div>
        <div style={{fontSize:13,fontWeight:900,color:state==='green'?NAVY:s.text,minWidth:34,textAlign:'right'}}>{value}%</div>
      </div>
      <input type="range" min={0} max={100} value={value} onChange={e=>onChange(resource.id,+e.target.value)} style={{accentColor:state==='green'?dimColor:s.border}}/>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:GREY_M,marginTop:1}}>
        <span>0</span><span style={{color:AMBER_B}}>⚠{resource.amberAt}</span><span style={{color:RED_B}}>✕{resource.redAt}</span><span>100</span>
      </div>
      {state!=='green'&&<div style={{marginTop:5,fontSize:10,color:s.text,lineHeight:1.4,borderTop:`1px solid ${s.border}44`,paddingTop:4}}>↳ {resource.depNote}</div>}
    </div>
  );
}

function FinanceBadge({id,status}){
  const fi=FINANCE.find(f=>f.id===id);
  const cols={healthy:{bg:GREEN_BG,border:GREEN_B,text:GREEN,label:'Healthy'},pressured:{bg:AMBER_BG,border:AMBER_B,text:AMBER,label:'Pressured'},critical:{bg:RED_BG,border:RED_B,text:RED,label:'Critical'}};
  const col=cols[status]||cols.healthy;
  return(
    <div style={{background:col.bg,border:`1px solid ${col.border}`,borderRadius:8,padding:'8px 10px',marginBottom:7}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:800,color:NAVY}}>{fi?.label}</div>
          <div style={{fontSize:10,color:GREY_M,marginTop:1}}>{fi?.desc}</div>
          <div style={{fontSize:10,color:DIM.finance,fontWeight:700,marginTop:2}}>→ {fi?.feeds.map(fid=>ALL_RES.find(r=>r.id===fid)?.label).join(', ')}</div>
        </div>
        <span style={{fontSize:9,fontWeight:800,color:col.text,background:col.border+'22',border:`1px solid ${col.border}`,borderRadius:20,padding:'2px 7px',marginLeft:8,whiteSpace:'nowrap'}}>{col.label}</span>
      </div>
    </div>
  );
}

function OutputPanel({result,finance,hasRun,isCalculating,discussionMode,onToggleDiscussion}){
  const [picks,setPicks]=useState({});
  if(!hasRun&&!isCalculating)return(
    <div style={{background:WHITE,borderRadius:12,border:`1px solid ${GREY_L}`,padding:32,textAlign:'center',minHeight:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{fontSize:40,marginBottom:12,opacity:0.2,color:NAVY}}>◎</div>
      <div style={{fontSize:14,color:GREY_M,fontWeight:800}}>Awaiting stress test</div>
      <div style={{fontSize:12,color:GREY_M,marginTop:6,maxWidth:200,lineHeight:1.6}}>Adjust resource sliders on the left, then press Run Stress Test</div>
    </div>
  );
  if(isCalculating)return(
    <div style={{background:WHITE,borderRadius:12,border:`1px solid ${GREY_L}`,padding:32,textAlign:'center',minHeight:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:38,height:38,border:`3px solid ${NAVY_LIGHT}`,borderTopColor:NAVY,borderRadius:'50%',animation:'spin 0.8s linear infinite',marginBottom:14}}/>
      <div style={{fontSize:13,color:NAVY,fontWeight:800,animation:'calcPulse 1s ease-in-out infinite'}}>Analysing system state...</div>
      <div style={{fontSize:11,color:GREY_M,marginTop:5}}>Evaluating resource interdependencies</div>
    </div>
  );
  const{sys,breaches,warnings,cascades,vulns}=result;
  const s=SC[sys];
  const SL={green:'Within Tolerance',amber:'Tolerance Under Pressure',red:'Tolerance Breached'};
  return(
    <div className="fade-up">
      <div style={{background:s.bg,border:`2px solid ${s.border}`,borderRadius:12,padding:'15px 18px',marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
          <div style={{width:12,height:12,borderRadius:'50%',background:s.dot,flexShrink:0,animation:sys==='red'?'pulse-red 1.5s infinite':'none'}}/>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:s.text}}>{SL[sys]}</div>
        </div>
        <div style={{fontSize:13,color:sys==='green'?GREY:s.text,lineHeight:1.6}}>
          {sys==='green'&&'All resources within operating thresholds. The IBS 1 promise is currently deliverable.'}
          {sys==='amber'&&`${warnings.length} resource${warnings.length!==1?'s':''} under pressure${cascades.length>0?`, ${cascades.length} cascade${cascades.length!==1?'s':''} active`:''}.  The promise is at risk — further degradation will breach tolerance.`}
          {sys==='red'&&<><strong>{breaches.length} resource{breaches.length!==1?'s':''} below threshold.</strong> Cranfield cannot currently deliver the full IBS 1 promise.</>}
        </div>
      </div>

      <div style={{marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:800,color:GREY_M,textTransform:'uppercase',letterSpacing:2,marginBottom:7}}>Finance Enablers</div>
        {FINANCE.map(fi=><FinanceBadge key={fi.id} id={fi.id} status={finance?.[fi.id]||'healthy'}/>)}
      </div>

      {cascades.length>0&&(
        <div style={{background:AMBER_BG,border:`1px solid ${AMBER_B}`,borderRadius:10,padding:'12px 14px',marginBottom:12}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:AMBER,marginBottom:8}}>Active Dependency Cascades</div>
          {cascades.map((c,i)=>{
            const fr=ALL_RES.find(r=>r.id===c.from);const to=ALL_RES.find(r=>r.id===c.to);
            return(<div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,marginBottom:4,color:GREY}}>
              <span style={{background:SC[c.severity].border,color:'#fff',borderRadius:3,padding:'1px 6px',fontSize:9,fontWeight:800}}>{c.severity.toUpperCase()}</span>
              <span style={{fontWeight:700}}>{fr?.label}</span><span style={{color:GREY_M}}>→</span><span style={{fontWeight:700}}>{to?.label}</span>
            </div>);
          })}
        </div>
      )}

      {vulns.length>0&&(
        <div style={{background:NAVY,borderRadius:12,padding:'14px 14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:'#fff'}}>Identified Vulnerabilities</div>
            <button onClick={onToggleDiscussion} style={{background:discussionMode?AMBER_B:'transparent',color:discussionMode?NAVY:AMBER_B,border:`1.5px solid ${AMBER_B}`,borderRadius:20,padding:'4px 11px',fontSize:10,fontWeight:800,cursor:'pointer',fontFamily:"'Nunito Sans',sans-serif"}}>
              {discussionMode?'✓ Discussion':'Discussion Mode'}
            </button>
          </div>
          {vulns.map(r=>{
            const rec=RECS[r.id];if(!rec)return null;
            const m=MECHS[rec.m];
            return(
              <div key={r.id} style={{background:'rgba(255,255,255,0.05)',borderRadius:8,padding:'10px 11px',marginBottom:9,borderLeft:`3px solid ${m.color}`}}>
                <div style={{fontSize:12,fontWeight:800,color:'#fff',marginBottom:3}}>{r.label}</div>
                {!discussionMode?(
                  <div style={{background:`${m.color}25`,borderRadius:6,padding:'9px 10px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                      <span style={{fontSize:14}}>{m.icon}</span>
                      <span style={{fontSize:12,fontWeight:800,color:m.color}}>{m.label}</span>
                    </div>
                    <div style={{fontSize:11,color:'#ccc',marginBottom:4,lineHeight:1.5}}><span style={{color:'#fff',fontWeight:700}}>Why: </span>{rec.why}</div>
                    <div style={{fontSize:11,color:'#bbb',lineHeight:1.5,fontStyle:'italic'}}><span style={{color:'#ddd',fontStyle:'normal',fontWeight:700}}>Action: </span>{rec.action}</div>
                  </div>
                ):(
                  <div>
                    <div style={{fontSize:11,color:AMBER_B,fontWeight:700,marginBottom:6}}>Which mechanism would you apply? Select and defend.</div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginBottom:6}}>
                      {Object.entries(MECHS).map(([k,mx])=>{
                        const sel=picks[r.id]===k;
                        return(<button key={k} onClick={()=>setPicks(p=>({...p,[r.id]:k}))} style={{background:sel?`${mx.color}33`:'rgba(255,255,255,0.05)',border:`1.5px solid ${sel?mx.color:'rgba(255,255,255,0.1)'}`,borderRadius:6,padding:'7px 8px',cursor:'pointer',textAlign:'left'}}>
                          <div style={{fontSize:13,marginBottom:1}}>{mx.icon}</div>
                          <div style={{fontSize:11,fontWeight:800,color:sel?mx.color:'#bbb'}}>{mx.label}</div>
                        </button>);
                      })}
                    </div>
                    {picks[r.id]&&(
                      <div style={{padding:'8px 10px',borderRadius:6,background:picks[r.id]===rec.m?'rgba(76,175,80,0.12)':'rgba(255,183,0,0.1)',border:`1px solid ${picks[r.id]===rec.m?GREEN_B:AMBER_B}`}}>
                        <div style={{fontSize:11,color:'#ccc',marginBottom:3,lineHeight:1.4}}>{MECHS[picks[r.id]].desc}</div>
                        {picks[r.id]===rec.m
                          ?<div style={{fontSize:10,color:GREEN_B}}>✓ Matches model recommendation — {rec.why}</div>
                          :<div style={{fontSize:10,color:AMBER_B}}>Model recommends <strong>{MECHS[rec.m].label}</strong>. Can you argue why? Or defend your choice.</div>}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {sys==='green'&&<div style={{background:GREEN_BG,border:`1px solid ${GREEN_B}`,borderRadius:10,padding:'12px 14px',fontSize:12,color:GREEN,lineHeight:1.6,marginTop:8}}><strong>No vulnerabilities identified.</strong> Try degrading individual resources to observe cascade behaviour.</div>}
    </div>
  );
}

function Header({step,setStep}){
  const steps=['① Scenario','② IBS','③ Tolerance','④ Resources','⑤ Stress Test'];
  return(
    <div style={{background:NAVY,borderBottom:`3px solid ${NAVY_MID}`}}>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'18px 20px 0'}}>
        <div style={{fontSize:10,letterSpacing:3,color:'rgba(255,255,255,0.4)',fontWeight:700,textTransform:'uppercase',marginBottom:5}}>Cranfield School of Management · Resilience Programme</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:'#fff',marginBottom:2}}>IBS 1 — Students as Learners</div>
        <div style={{fontSize:12,color:'rgba(255,255,255,0.45)',fontStyle:'italic',marginBottom:14}}>Impact Tolerance &amp; Stress Testing Model</div>
        <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:0}}>
          {steps.map((s,i)=>(
            <button key={i} onClick={()=>setStep(i)} style={{background:step===i?'#fff':step>i?'rgba(255,255,255,0.12)':'transparent',border:`1px solid ${step===i?'#fff':step>i?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.1)'}`,borderBottom:'none',borderRadius:'8px 8px 0 0',padding:'8px 14px',cursor:'pointer',fontFamily:"'Nunito Sans',sans-serif",fontWeight:700,fontSize:11,color:step===i?NAVY:step>i?'rgba(255,255,255,0.7)':'rgba(255,255,255,0.35)',whiteSpace:'nowrap',transition:'all 0.2s'}}>
              {s}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function App(){
  const initVals=Object.fromEntries(ALL_RES.map(r=>[r.id,r.default]));
  const initFin=Object.fromEntries(FINANCE.map(f=>[f.id,'healthy']));
  const [step,setStep]=useState(0);
  const [values,setValues]=useState(initVals);
  const [finance,setFinance]=useState(initFin);
  const [scenario,setScenario]=useState(null);
  const [result,setResult]=useState(null);
  const [hasRun,setHasRun]=useState(false);
  const [isCalc,setIsCalc]=useState(false);
  const [discussionMode,setDiscussionMode]=useState(false);

  const runTest=()=>{
    setIsCalc(true);setHasRun(false);
    setTimeout(()=>{setResult(computeState(values));setIsCalc(false);setHasRun(true);},2000);
  };

  const isMobile=typeof window!=='undefined'&&window.innerWidth<700;

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(180deg,#f4f6fb 0%,#eef1f8 100%)'}}>
      <Header step={step} setStep={setStep}/>

      {/* STEP 0 — SCENARIOS */}
      {step===0&&(
        <div className="fade-up" style={{maxWidth:1100,margin:'0 auto',padding:'28px 20px'}}>
          <div style={{marginBottom:18}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:NAVY,marginBottom:6}}>Select a Scenario</div>
            <div style={{fontSize:13,color:GREY,lineHeight:1.7,maxWidth:700}}>Each scenario pre-loads a pattern of resource degradation — without specifying a cause. This is deliberate: the model is risk-agnostic. The same resource pattern could result from many different disruptions. Select a scenario, adjust sliders if you wish, then run the stress test on the final tab.</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14,marginBottom:22}}>
            {SCENARIOS.map(sc=>{
              const sel=scenario?.id===sc.id;
              return(
                <button key={sc.id} onClick={()=>{setScenario(sc);setValues({...sc.values});setFinance({...sc.finance});setHasRun(false);setResult(null);}}
                  style={{background:sel?NAVY:WHITE,border:`2px solid ${sel?NAVY:GREY_L}`,borderRadius:12,padding:'18px 16px',cursor:'pointer',textAlign:'left',transition:'all 0.2s',boxShadow:sel?`0 4px 16px ${NAVY}30`:'none'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:7}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:sel?'#fff':NAVY,lineHeight:1.3,flex:1,paddingRight:8}}>{sc.name}</div>
                    <span style={{fontSize:9,fontWeight:800,color:sel?'#fff':sc.tagColor,background:sel?sc.tagColor+'55':'transparent',border:`1px solid ${sc.tagColor}`,borderRadius:20,padding:'2px 7px',whiteSpace:'nowrap'}}>{sc.tag}</span>
                  </div>
                  <div style={{fontSize:11,color:sel?'rgba(255,255,255,0.6)':GREY_M,fontWeight:700,marginBottom:7}}>{sc.subtitle}</div>
                  <div style={{fontSize:12,color:sel?'rgba(255,255,255,0.8)':GREY,lineHeight:1.5}}>{sc.desc}</div>
                </button>
              );
            })}
          </div>
          {scenario&&<div style={{background:NAVY_LIGHT,borderRadius:10,padding:'11px 14px',fontSize:13,color:NAVY,fontWeight:700}}>✓ <strong>{scenario.name}</strong> loaded — sliders pre-set on the Stress Test tab. Adjust freely before running.</div>}
          <div style={{marginTop:16}}><button className="primary-btn" onClick={()=>setStep(1)}>Continue to IBS Statement →</button></div>
        </div>
      )}

      {/* STEP 1 — IBS */}
      {step===1&&(
        <div className="fade-up" style={{maxWidth:800,margin:'0 auto',padding:'28px 20px'}}>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:10,letterSpacing:3,color:GREY_M,fontWeight:800,textTransform:'uppercase',marginBottom:14}}>IBS 1 — Students as Learners</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:NAVY,lineHeight:1.7,marginBottom:20,fontStyle:'italic'}}>"Students need to develop the leadership capability and management knowledge to be effective in their careers and organisations. They depend on Cranfield School of Management to make that possible."</div>
            <div style={{borderTop:`1px solid ${GREY_L}`,paddingTop:16}}>
              <div style={{fontSize:11,color:GREY_M,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Why it matters</div>
              <div style={{fontSize:14,color:GREY,lineHeight:1.7}}>If this promise fails, students leave without the capabilities they came for. Reputation suffers, recruitment declines, and the School's commercial and academic standing erodes.</div>
            </div>
          </div>
          <div style={{background:NAVY_PALE,borderRadius:10,padding:'13px 16px',fontSize:12,color:GREY,lineHeight:1.6,marginBottom:20,border:`1px solid ${NAVY_LIGHT}`}}><strong style={{color:NAVY}}>Format check:</strong> Written in stakeholder terms · Describes an outcome, not an activity · Externally facing · A failure would be immediately recognisable.</div>
          <button className="primary-btn" onClick={()=>setStep(2)}>Define Impact Tolerance →</button>
        </div>
      )}

      {/* STEP 2 — TOLERANCE */}
      {step===2&&(
        <div className="fade-up" style={{maxWidth:800,margin:'0 auto',padding:'28px 20px'}}>
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:10,letterSpacing:3,color:GREY_M,fontWeight:800,textTransform:'uppercase',marginBottom:14}}>Impact Tolerance Statement</div>
            <div style={{fontSize:15,color:NAVY,lineHeight:1.8,marginBottom:22,fontStyle:'italic'}}>"Cranfield School of Management can absorb disruption to programme delivery provided students continue to make structured progress toward their learning outcomes. The tolerance is breached when students cannot access faculty-led learning, peer cohort interaction, or assessed feedback for a sustained period, or when the quality of those interactions falls below the standard that justifies the programme's reputation and fee."</div>
            <div style={{borderTop:`1px solid ${GREY_L}`,paddingTop:18}}>
              <div style={{fontSize:11,color:GREY_M,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:14}}>Threshold Indicators</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {[{label:'Faculty contact gap',value:'Max 5 consecutive days without structured faculty contact per module'},{label:'Teaching hours delivered',value:'No more than 15% of scheduled hours undelivered in any term'},{label:'Assessment feedback',value:'Feedback returned within 10 working days of submission'},{label:'Cohort participation',value:'Minimum 60% of enrolled cohort participating in any session'}].map((t,i)=>(
                  <div key={i} style={{background:NAVY_PALE,borderRadius:8,padding:'11px 13px',border:`1px solid ${NAVY_LIGHT}`}}>
                    <div style={{fontSize:10,color:GREY_M,fontWeight:800,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{t.label}</div>
                    <div style={{fontSize:12,color:GREY,lineHeight:1.5}}>{t.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{background:'#fffbeb',border:`1px solid ${AMBER_B}`,borderRadius:10,padding:'13px 16px',fontSize:12,color:AMBER,lineHeight:1.6,marginBottom:20}}><strong>Facilitator note:</strong> These thresholds are illustrative and sense-checkable in the room. The discipline is writing them in outcome terms — what the student experiences, not what the institution measures.</div>
          <button className="primary-btn" onClick={()=>setStep(3)}>Map Resources →</button>
        </div>
      )}

      {/* STEP 3 — RESOURCE MAP */}
      {step===3&&(
        <div className="fade-up" style={{maxWidth:960,margin:'0 auto',padding:'28px 20px'}}>
          <div style={{fontSize:13,color:GREY,lineHeight:1.7,marginBottom:20,maxWidth:700}}>Resources are organised across five dimensions. Finance is shown as an enabling dimension — visible indicators that feed into other dimensions rather than direct delivery inputs. Environment reflects natural capital: its link to this IBS is acknowledged as indirect, and is itself a learning and discussion point.</div>
          {DIMENSIONS.map(dim=>(
            <div key={dim.id} style={{marginBottom:18}}>
              <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:11,paddingBottom:7,borderBottom:`2px solid ${dim.color}33`}}>
                <div style={{width:9,height:9,borderRadius:2,background:dim.color,flexShrink:0}}/>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:NAVY}}>{dim.label}</div>
                <div style={{fontSize:11,color:GREY_M}}>{dim.desc}</div>
                {dim.isNatural&&<span style={{fontSize:9,fontWeight:800,color:GREY_M,background:NAVY_PALE,borderRadius:20,padding:'2px 7px',marginLeft:'auto',border:`1px solid ${NAVY_LIGHT}`}}>Natural Capital</span>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:9}}>
                {dim.resources.map(r=>(
                  <div key={r.id} style={{background:WHITE,border:`1px solid ${dim.color}2a`,borderRadius:8,padding:'10px 12px'}}>
                    <div style={{fontSize:12,fontWeight:800,color:NAVY,marginBottom:3}}>{r.label}</div>
                    <div style={{fontSize:11,color:GREY_M,lineHeight:1.5,marginBottom:r.dependents.length||r.financeLink?5:0}}>{r.desc}</div>
                    {r.dependents.length>0&&<div style={{fontSize:10,color:dim.color,fontWeight:700}}>→ {r.dependents.map(d=>ALL_RES.find(x=>x.id===d)?.label).join(', ')}</div>}
                    {r.financeLink&&<div style={{fontSize:10,color:DIM.finance,fontWeight:700,marginTop:2}}>💰 {FINANCE.find(f=>f.id===r.financeLink)?.label}</div>}
                  </div>
                ))}
              </div>
            </div>
          ))}
          <div style={{marginBottom:18}}>
            <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:11,paddingBottom:7,borderBottom:`2px solid ${DIM.finance}33`}}>
              <div style={{width:9,height:9,borderRadius:2,background:DIM.finance,flexShrink:0}}/>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:NAVY}}>Finance</div>
              <div style={{fontSize:11,color:GREY_M}}>Enabling dimension — read-only indicators that feed into other dimensions</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:9}}>
              {FINANCE.map(fi=>(
                <div key={fi.id} style={{background:WHITE,border:`1px solid ${DIM.finance}2a`,borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontSize:12,fontWeight:800,color:NAVY,marginBottom:3}}>{fi.label}</div>
                  <div style={{fontSize:11,color:GREY_M,lineHeight:1.5,marginBottom:4}}>{fi.desc}</div>
                  <div style={{fontSize:10,color:DIM.finance,fontWeight:700}}>→ {fi.feeds.map(fid=>ALL_RES.find(r=>r.id===fid)?.label).join(', ')}</div>
                </div>
              ))}
            </div>
          </div>
          <button className="primary-btn" onClick={()=>setStep(4)}>Begin Stress Test →</button>
        </div>
      )}

      {/* STEP 4 — STRESS TEST */}
      {step===4&&(
        <div className="fade-up" style={{maxWidth:1100,margin:'0 auto',padding:'28px 20px'}}>
          {scenario&&<div style={{background:NAVY_LIGHT,borderRadius:8,padding:'9px 14px',marginBottom:16,fontSize:12,color:NAVY,fontWeight:700,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span style={{opacity:0.6}}>Scenario:</span> {scenario.name}
            <span style={{fontSize:11,fontWeight:400,color:GREY_M}}>— sliders pre-set. Adjust freely before running.</span>
          </div>}
          <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'minmax(0,1fr) minmax(0,1fr)',gap:20,alignItems:'start'}}>
            <div>
              <div style={{fontSize:12,color:GREY_M,fontWeight:800,marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>Resource Levels</div>
              {DIMENSIONS.map(dim=>(
                <div key={dim.id} style={{marginBottom:14}}>
                  <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7,paddingBottom:5,borderBottom:`2px solid ${dim.color}2a`}}>
                    <div style={{width:7,height:7,borderRadius:2,background:dim.color,flexShrink:0}}/>
                    <div style={{fontSize:11,fontWeight:800,color:NAVY}}>{dim.label}</div>
                    {dim.isNatural&&<span style={{fontSize:9,color:GREY_M,fontWeight:700,marginLeft:'auto'}}>Natural Capital</span>}
                  </div>
                  {dim.resources.map(r=>(
                    <CompactSlider key={r.id} resource={r} value={values[r.id]??100} onChange={(id,v)=>setValues(p=>({...p,[id]:v}))} state={result?.rs?.[r.id]?.state||'green'} dimColor={dim.color}/>
                  ))}
                </div>
              ))}
              <button className="primary-btn" onClick={runTest} disabled={isCalc} style={{width:'100%',marginTop:6,fontSize:15,padding:'14px'}}>
                {isCalc?'Analysing...':'▶  Run Stress Test'}
              </button>
              <button className="ghost-btn" onClick={()=>{setValues(initVals);setFinance(initFin);setHasRun(false);setResult(null);setScenario(null);}} style={{width:'100%',marginTop:8,fontSize:12}}>
                Reset all to 100%
              </button>
            </div>
            <div style={{position:isMobile?'static':'sticky',top:20}}>
              <div style={{fontSize:12,color:GREY_M,fontWeight:800,marginBottom:10,textTransform:'uppercase',letterSpacing:1}}>System State &amp; Recommendations</div>
              <OutputPanel result={result} finance={finance} hasRun={hasRun} isCalculating={isCalc} discussionMode={discussionMode} onToggleDiscussion={()=>setDiscussionMode(d=>!d)}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
