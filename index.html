// ── COMPUTATION ───────────────────────────────────────────────────────────────
function computeState(values) {
  const rs = {};
  const cascades = [], breaches = [], warnings = [];
  ALL_RES.forEach(r => {
    const v = values[r.id] ?? 100;
    let state = 'green';
    if (v <= r.redAt) state = 'red';
    else if (v <= r.amberAt) state = 'amber';
    rs[r.id] = { value: v, state };
    if (state === 'red') breaches.push(r);
    else if (state === 'amber') warnings.push(r);
    if (state !== 'green') r.dependents.forEach(dep => cascades.push({ from: r.id, to: dep, severity: state }));
  });
  let sys = 'green';
  if (breaches.length > 0) sys = 'red';
  else if (warnings.length > 0 || cascades.length > 0) sys = 'amber';
  const vulns = [...new Map([...breaches, ...warnings.filter(r => cascades.some(c => c.from === r.id))].map(r => [r.id, r])).values()];
  return { rs, sys, breaches, warnings, cascades, vulns };
}

// ── SLIDER ────────────────────────────────────────────────────────────────────
function CompactSlider({ resource, value, onChange, state, dimColor }) {
  const s = SC[state];

  const thumbColor = state === 'green' ? dimColor : s.thumb;

  return (
    <div style={{ marginBottom:7, padding:'9px 11px', background: state==='green'?'#fafbfd':s.bg, border:`1px solid ${state==='green'?T.navyBorder:s.border}`, borderLeft:`3px solid ${state==='green'?dimColor:s.border}`, borderRadius:8, transition:'all 0.3s' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
        <div style={{ fontSize:11, fontWeight:800, color:T.navy, flex:1, paddingRight:8, lineHeight:1.3 }}>{resource.label}</div>
        <div style={{ fontSize:13, fontWeight:900, color: state==='green'?T.navy:s.text, minWidth:34, textAlign:'right' }}>{value}%</div>
      </div>
      <style>{`#sl-${resource.id}::-webkit-slider-runnable-track{background:${trackColor};}#sl-${resource.id}::-webkit-slider-thumb{background:${thumbColor};}#sl-${resource.id}::-moz-range-track{background:${trackColor};}#sl-${resource.id}::-moz-range-thumb{background:${thumbColor};}`}</style>
      <input id={`sl-${resource.id}`} type="range" min={0} max={100} value={value} onChange={e => onChange(resource.id, +e.target.value)} />
      <div style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:T.greyM, marginTop:1 }}>
        <span>0</span>
        <span style={{ color:T.amberB }}>⚠{resource.amberAt}</span>
        <span style={{ color:T.redB }}>✕{resource.redAt}</span>
        <span>100</span>
      </div>
      {state !== 'green' && (
        <div style={{ marginTop:6, fontSize:10, color:s.text, lineHeight:1.4, borderTop:`1px solid ${s.border}44`, paddingTop:5 }}>
          <div style={{ marginBottom:3 }}><span style={{ fontWeight:800 }}>↳ Cascade: </span>{resource.depNote}</div>
        </div>
      )}
    </div>
  );
}

  );
}

// ── FINANCE BADGE ─────────────────────────────────────────────────────────────
function FinanceBadge({ id, status }) {
  const fi = FINANCE.find(f => f.id === id);
  const cols = {
    healthy:  { bg:T.greenBg, border:T.greenB, text:T.green, label:'Healthy'   },
    pressured:{ bg:T.amberBg, border:T.amberB, text:T.amber, label:'Pressured' },
    critical: { bg:T.redBg,   border:T.redB,   text:T.red,   label:'Critical'  },
  };
  const col = cols[status] || cols.healthy;
  return (
    <div style={{ background:col.bg, border:`1px solid ${col.border}`, borderRadius:8, padding:'8px 11px', marginBottom:7 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:11, fontWeight:800, color:T.navy }}>{fi?.label}</div>
          <div style={{ fontSize:10, color:T.greyM, marginTop:1 }}>{fi?.desc}</div>
          <div style={{ fontSize:10, color:T.dim.finance, fontWeight:700, marginTop:2 }}>→ {fi?.feeds.map(fid => ALL_RES.find(r=>r.id===fid)?.label).join(', ')}</div>
        </div>
        <span style={{ fontSize:9, fontWeight:800, color:col.text, background:col.border+'22', border:`1px solid ${col.border}`, borderRadius:20, padding:'2px 8px', marginLeft:8, whiteSpace:'nowrap' }}>{col.label}</span>
      </div>
    </div>
  );
}

// ── OUTPUT PANEL ──────────────────────────────────────────────────────────────
function OutputPanel({ result, finance, hasRun, isCalculating, discussionMode, onToggleDiscussion }) {
  const [picks, setPicks] = useState({});

  if (!hasRun && !isCalculating) return (
    <div style={{ background:'#fff', borderRadius:14, border:`1px solid ${T.greyL}`, padding:32, textAlign:'center', minHeight:320, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px rgba(27,58,107,0.07)' }}>
      <div style={{ fontSize:44, marginBottom:14, opacity:0.15, color:T.navy }}>◎</div>
      <div style={{ fontSize:15, color:T.greyM, fontWeight:800 }}>Awaiting stress test</div>
      <div style={{ fontSize:12, color:T.greyM, marginTop:8, maxWidth:220, lineHeight:1.6 }}>Adjust the resource sliders, then press <strong>Run Stress Test</strong></div>
    </div>
  );

  if (isCalculating) return (
    <div style={{ background:'#fff', borderRadius:14, border:`1px solid ${T.greyL}`, padding:32, textAlign:'center', minHeight:320, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', boxShadow:'0 2px 8px rgba(27,58,107,0.07)' }}>
      <div style={{ width:42, height:42, border:`3px solid ${T.navyLight}`, borderTopColor:T.navy, borderRadius:'50%', animation:'spin 0.8s linear infinite', marginBottom:16 }}/>
      <div style={{ fontSize:14, color:T.navy, fontWeight:800, animation:'calcPulse 1.2s ease-in-out infinite' }}>Analysing system state...</div>
      <div style={{ fontSize:11, color:T.greyM, marginTop:6 }}>Evaluating resource interdependencies</div>
    </div>
  );

  const { sys, breaches, warnings, cascades, vulns } = result;
  const s = SC[sys];
  const SL = { green:'Within Tolerance', amber:'Tolerance Under Pressure', red:'Tolerance Breached' };

  return (
    <div className="fade-up">

      {/* 1. VULNERABILITIES FIRST — the point of the exercise */}
      {vulns.length > 0 && (
        <div style={{ background:T.navy, borderRadius:14, padding:'16px 16px', marginBottom:14 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:'#fff' }}>Identified Vulnerabilities</div>
            <button onClick={onToggleDiscussion} style={{ background: discussionMode?T.amberB:'transparent', color: discussionMode?T.navy:T.amberB, border:`1.5px solid ${T.amberB}`, borderRadius:20, padding:'5px 13px', fontSize:10, fontWeight:800, cursor:'pointer', fontFamily:"'Nunito Sans',sans-serif", transition:'all 0.2s' }}>
              {discussionMode ? '✓ Discussion Mode' : 'Discussion Mode'}
            </button>
          </div>
          {vulns.map(r => {
            const rec = RECS[r.id]; if (!rec) return null;
            const m = MECHS[rec.m];
            return (
              <div key={r.id} style={{ background:'rgba(255,255,255,0.05)', borderRadius:10, padding:'12px 13px', marginBottom:10, borderLeft:`3px solid ${m.color}` }}>
                {/* Consequence — leads visually */}
                <div style={{ background:`${m.color}18`, borderRadius:7, padding:'9px 11px', marginBottom:8 }}>
                  <div style={{ fontSize:10, fontWeight:800, color:m.color, textTransform:'uppercase', letterSpacing:1.5, marginBottom:4 }}>Consequence if unaddressed</div>
                  <div style={{ fontSize:13, fontWeight:700, color:'#fff', lineHeight:1.5, fontStyle:'italic' }}>{r.consequence}</div>
                </div>
                <div style={{ fontSize:12, fontWeight:800, color:'rgba(255,255,255,0.6)', marginBottom:6 }}>{r.label}</div>

                {!discussionMode ? (
                  <div style={{ background:`${m.color}22`, borderRadius:7, padding:'9px 11px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:5 }}>
                      <span style={{ fontSize:16 }}>{m.icon}</span>
                      <span style={{ fontSize:13, fontWeight:800, color:m.color }}>Recommended: {m.label}</span>
                    </div>
                    <div style={{ fontSize:11, color:'#ccc', marginBottom:5, lineHeight:1.5 }}><span style={{ color:'#fff', fontWeight:700 }}>Why: </span>{rec.why}</div>
                    <div style={{ fontSize:11, color:'#bbb', lineHeight:1.5, fontStyle:'italic' }}><span style={{ color:'#ddd', fontStyle:'normal', fontWeight:700 }}>Action: </span>{rec.action}</div>
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize:11, color:T.amberB, fontWeight:800, marginBottom:7 }}>Which mechanism would you apply to prevent this consequence? Select and defend.</div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6, marginBottom:7 }}>
                      {Object.entries(MECHS).map(([k, mx]) => {
                        const sel = picks[r.id] === k;
                        return (
                          <button key={k} onClick={() => setPicks(p => ({...p,[r.id]:k}))} style={{ background: sel?`${mx.color}33`:'rgba(255,255,255,0.05)', border:`1.5px solid ${sel?mx.color:'rgba(255,255,255,0.1)'}`, borderRadius:7, padding:'8px 9px', cursor:'pointer', textAlign:'left', transition:'all 0.15s' }}>
                            <div style={{ fontSize:14, marginBottom:2 }}>{mx.icon}</div>
                            <div style={{ fontSize:11, fontWeight:800, color: sel?mx.color:'#bbb' }}>{mx.label}</div>
                          </button>
                        );
                      })}
                    </div>
                    {picks[r.id] && (
                      <div style={{ padding:'9px 11px', borderRadius:7, background: picks[r.id]===rec.m?'rgba(76,175,80,0.12)':'rgba(245,158,11,0.1)', border:`1px solid ${picks[r.id]===rec.m?T.greenB:T.amberB}` }}>
                        <div style={{ fontSize:11, color:'#ccc', marginBottom:4, lineHeight:1.5 }}>{MECHS[picks[r.id]].desc}</div>
                        {picks[r.id]===rec.m
                          ? <div style={{ fontSize:10, color:T.greenB, fontWeight:700 }}>✓ Matches model recommendation — {rec.why}</div>
                          : <div style={{ fontSize:10, color:T.amberB }}>Model recommends <strong>{MECHS[rec.m].label}</strong> here. Can you argue why? Or make the case for your choice.</div>}
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* 2. SYSTEM STATUS */}
      <div style={{ background:s.bg, border:`2px solid ${s.border}`, borderRadius:12, padding:'14px 17px', marginBottom:12 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
          <div style={{ width:13, height:13, borderRadius:'50%', background:s.dot, flexShrink:0, animation:sys==='red'?'pulse-red 1.5s infinite':'none' }}/>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:s.text }}>{SL[sys]}</div>
        </div>
        <div style={{ fontSize:13, color:sys==='green'?T.grey:s.text, lineHeight:1.6 }}>
          {sys==='green' && 'All resources within operating thresholds. The IBS 1 promise is currently deliverable.'}
          {sys==='amber' && `${warnings.length} resource${warnings.length!==1?'s':''} under pressure${cascades.length>0?`, ${cascades.length} cascade${cascades.length!==1?'s':''} active`:''}.  The promise is at risk — further degradation will breach tolerance.`}
          {sys==='red' && <><strong>{breaches.length} resource{breaches.length!==1?'s':''} below threshold.</strong> Cranfield cannot currently deliver the full promise of IBS 1.</>}
        </div>
      </div>

      {/* 3. CASCADES — evidence chain */}
      {cascades.length > 0 && (
        <div style={{ background:T.amberBg, border:`1px solid ${T.amberB}`, borderRadius:10, padding:'12px 14px', marginBottom:12 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:13, fontWeight:700, color:T.amber, marginBottom:8 }}>Dependency Cascade Chain</div>
          {cascades.map((c, i) => {
            const fr = ALL_RES.find(r=>r.id===c.from);
            const to = ALL_RES.find(r=>r.id===c.to);
            return (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, marginBottom:4, color:T.grey }}>
                <span style={{ background:SC[c.severity].border, color:'#fff', borderRadius:3, padding:'1px 6px', fontSize:9, fontWeight:800 }}>{c.severity.toUpperCase()}</span>
                <span style={{ fontWeight:800 }}>{fr?.label}</span>
                <span style={{ color:T.greyM }}>→</span>
                <span style={{ fontWeight:800 }}>{to?.label}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* 4. FINANCE */}
      <div style={{ marginBottom:4 }}>
        <div style={{ fontSize:10, fontWeight:800, color:T.greyM, textTransform:'uppercase', letterSpacing:2, marginBottom:8 }}>Finance Enablers</div>
        {FINANCE.map(fi => <FinanceBadge key={fi.id} id={fi.id} status={finance?.[fi.id]||'healthy'}/>)}
      </div>

      {sys==='green' && (
        <div style={{ background:T.greenBg, border:`1px solid ${T.greenB}`, borderRadius:10, padding:'12px 14px', fontSize:12, color:T.green, lineHeight:1.6, marginTop:10 }}>
          <strong>No vulnerabilities identified.</strong> Try degrading individual resources to observe cascade behaviour and threshold effects.
        </div>
      )}
    </div>
  );
}

        </div>
      )}
      <div style={{ display:'grid', gridTemplateColumns: isMobile?'1fr':'minmax(0,1fr) minmax(0,1fr)', gap:22, alignItems:'start' }}>

        {/* LEFT — SLIDERS */}
        <div>
          <div style={{ fontSize:11, color:T.greyM, fontWeight:800, textTransform:'uppercase', letterSpacing:1.5, marginBottom:12 }}>Resource Levels</div>
          {DIMENSIONS.map(dim => (
            <div key={dim.id} style={{ marginBottom:16 }}>
              <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:8, paddingBottom:6, borderBottom:`2px solid ${dim.color}2a` }}>
                <div style={{ width:7, height:7, borderRadius:2, background:dim.color, flexShrink:0 }}/>
                <div style={{ fontSize:11, fontWeight:800, color:T.navy }}>{dim.label}</div>
                {dim.isNatural && <span style={{ fontSize:9, color:T.greyM, fontWeight:700, marginLeft:'auto' }}>Natural Capital</span>}
              </div>
              {dim.resources.map(r => (
                <CompactSlider key={r.id} resource={r} value={values[r.id]??100}
                  onChange={(id,v) => setValues(p=>({...p,[id]:v}))}
                  state={result?.rs?.[r.id]?.state||'green'} dimColor={dim.color} />
              ))}
            </div>
          ))}

          <button className="primary-btn" onClick={onRun} disabled={isCalculating}
            style={{ width:'100%', marginTop:8, fontSize:15, padding:'16px', borderRadius:10 }}>
            {isCalculating ? 'Analysing...' : runCount > 0 ? '↺  Re-run Stress Test' : '▶  Run Stress Test'}
          </button>
          <button className="ghost-btn" onClick={() => setValues(initVals)} style={{ width:'100%', marginTop:8, fontSize:12 }}>
            Reset all to 100%
          </button>
        </div>

        {/* RIGHT — OUTPUT */}
        <div style={{ position: isMobile?'static':'sticky', top:80 }}>
          <div style={{ fontSize:11, color:T.greyM, fontWeight:800, textTransform:'uppercase', letterSpacing:1.5, marginBottom:12 }}>System State &amp; Recommendations</div>
          <OutputPanel result={result} finance={finance} hasRun={hasRun} isCalculating={isCalculating}
            discussionMode={discussionMode} onToggleDiscussion={() => setDiscussionMode(d=>!d)} />
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const initVals = Object.fromEntries(ALL_RES.map(r=>[r.id, r.default]));
  const initFin  = Object.fromEntries(FINANCE.map(f=>[f.id,'healthy']));

  const [step, setStep]               = useState(0);
  const [completedSteps, setCompleted]= useState([]);
  const [values, setValues]           = useState(initVals);
  const [finance, setFinance]         = useState(initFin);
  const [scenario, setScenario]       = useState(null);
  const [result, setResult]           = useState(null);
  const [hasRun, setHasRun]           = useState(false);
  const [isCalc, setIsCalc]           = useState(false);
  const [runCount, setRunCount]       = useState(0);
  const [discussionMode, setDisc]     = useState(false);

  const goTo = (i) => {
    setCompleted(prev => prev.includes(step) ? prev : [...prev, step]);
    setStep(i);
  };

  const runTest = () => {
    setIsCalc(true); setHasRun(false);
    setTimeout(() => {
      setResult(computeState(values));
      setIsCalc(false); setHasRun(true);
      setRunCount(c => c+1);
    }, 2000);
  };

  return (
    <div style={{ minHeight:'100vh', background:'linear-gradient(160deg,#f0f3f9 0%,#e8ecf5 100%)' }}>
      <Header step={step} setStep={goTo} completedSteps={completedSteps} />
      {step===0 && <Step0 onSelect={setScenario} selectedScenario={scenario} setValues={setValues} setFinance={setFinance} onNext={() => goTo(1)} />}
      {step===1 && <Step1 onNext={() => goTo(2)} />}
      {step===2 && <Step2 onNext={() => goTo(3)} />}
      {step===3 && <Step3 onNext={() => goTo(4)} />}
      {step===4 && <Step4 values={values} setValues={setValues} finance={finance} result={result} hasRun={hasRun} isCalculating={isCalc} onRun={runTest} runCount={runCount} discussionMode={discussionMode} setDiscussionMode={setDisc} selectedScenario={scenario} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
